<script type="text/babel">
const {useState,useEffect,useMemo,useCallback,useRef}=React;
const fmt=n=>'$'+(Number(n)||0).toLocaleString('es-AR');
const fmtK=n=>{const a=Math.abs(n);if(a>=1e6)return(n<0?'-':'')+'$'+(Math.abs(n)/1e6).toFixed(1)+'M';if(a>=1000)return(n<0?'-':'')+'$'+Math.round(Math.abs(n)/1000)+'k';return fmt(n);};
const hoy=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};
const mk=f=>f?f.slice(0,7):'';
const MESES_L=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DIAS_L=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];

const uid2=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);

const addM=(f,n)=>{const d=new Date(f+'T12:00:00');d.setMonth(d.getMonth()+n);return d.toISOString().slice(0,10);};
const pad=n=>String(n).padStart(2,'0');

/* ══ BIOMETRÍA (WebAuthn) ══ */
async function bioDisponible(){try{return !!(window.PublicKeyCredential&&await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable());}catch(e){return false;}}
function b64ToBuf(b){const s=atob(b);const u=new Uint8Array(s.length);for(let i=0;i<s.length;i++)u[i]=s.charCodeAt(i);return u.buffer;}
function bufToB64(buf){const b=new Uint8Array(buf);let s='';for(let i=0;i<b.length;i++)s+=String.fromCharCode(b[i]);return btoa(s);}
async function bioRegistrar(){const ch=new Uint8Array(32);crypto.getRandomValues(ch);const uid=new Uint8Array(16);crypto.getRandomValues(uid);const c=await navigator.credentials.create({publicKey:{challenge:ch,rp:{name:'Emma Control',id:location.hostname},user:{id:uid,name:'emma-control',displayName:'Emma Control'},pubKeyCredParams:[{type:'public-key',alg:-7},{type:'public-key',alg:-257}],authenticatorSelection:{authenticatorAttachment:'platform',userVerification:'required'},timeout:60000,attestation:'none'}});return bufToB64(c.rawId);}
async function bioVerificar(cred){const ch=new Uint8Array(32);crypto.getRandomValues(ch);await navigator.credentials.get({publicKey:{challenge:ch,rpId:location.hostname,allowCredentials:[{type:'public-key',id:b64ToBuf(cred)}],userVerification:'required',timeout:60000}});return true;}

/* ══ FIREBASE HOOK ══ */
function useFirestore(uid,col,init){
  const[v,sv]=useState(init);const[ready,setReady]=useState(false);const tmr=useRef(null);
  useEffect(()=>{if(!uid)return;const ref=db.collection('users').doc(uid).collection('datos').doc(col);
    const unsub=ref.onSnapshot(snap=>{if(snap.exists){const d=snap.data();sv(d.items||init);}else{sv(init);}setReady(true);},()=>setReady(true));
    return()=>unsub();},[uid,col]);
  const set=useCallback(x=>{const next=typeof x==='function'?x(v):x;sv(next);if(!uid)return;clearTimeout(tmr.current);tmr.current=setTimeout(()=>{db.collection('users').doc(uid).collection('datos').doc(col).set({items:next}).catch(console.error);},600);},[uid,col,v]);
  return[v,set,ready];
}

const ESCALAS={S:0.9,M:1,L:1.15,XL:1.32};
function useEscala(){

/* ══ SWIPE DE NAVEGACIÓN ══ */
function useSwipe(onLeft,onRight){
  const ts=useRef(null);
  const handleStart=useCallback(e=>{
    ts.current={x:e.touches[0].clientX,y:e.touches[0].clientY};
  },[]);
  const handleEnd=useCallback(e=>{
    if(!ts.current)return;
    const dx=e.changedTouches[0].clientX-ts.current.x;
    const dy=e.changedTouches[0].clientY-ts.current.y;
    // Solo activa si el movimiento horizontal es claramente mayor que el vertical
    if(Math.abs(dx)>Math.abs(dy)*1.5&&Math.abs(dx)>60){
      dx<0?onLeft():onRight();
    }
    ts.current=null;
  },[onLeft,onRight]);
  return{onTouchStart:handleStart,onTouchEnd:handleEnd};
}

/* ══ CALENDARIO ══ */
function Calendario({movimientos}){
  const hoyStr=hoy();
  const[mes,setMes]=useState({y:new Date().getFullYear(),m:new Date().getMonth()});
  const[diaSelec,setDiaSelec]=useState(null);
  const{y,m}=mes;

  const movPorDia=useMemo(()=>{
    const r={};
    movimientos.forEach(mv=>{
      if(!mv.fecha)return;
      if(!r[mv.fecha])r[mv.fecha]=[];
      r[mv.fecha].push(mv);
    });
    return r;
  },[movimientos]);

  const primer=new Date(y,m,1).getDay();
  const offset=primer===0?6:primer-1;
  const dias=new Date(y,m+1,0).getDate();
  const celdas=[];
  for(let i=0;i<offset;i++)celdas.push(null);
  for(let d=1;d<=dias;d++)celdas.push(d);

  const cambiar=dir=>{let nm=m+dir,ny=y;if(nm>11){nm=0;ny++;}if(nm<0){nm=11;ny--;}setMes({y:ny,m:nm});setDiaSelec(null);};
  const selDia=d=>{const k=`${y}-${pad(m+1)}-${pad(d)}`;setDiaSelec(diaSelec===k?null:k);};
  const isHoy=d=>hoyStr===`${y}-${pad(m+1)}-${pad(d)}`;

  const movDia=diaSelec?movPorDia[diaSelec]||[]:[];
  const ingDia=movDia.filter(m=>m.tipo==='ingreso').reduce((a,m)=>a+m.monto,0);
  const gastDia=movDia.filter(m=>m.tipo==='gasto').reduce((a,m)=>a+m.monto,0);

  return<div style={S.card}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
      <button onClick={()=>cambiar(-1)} style={{background:'none',border:'none',color:'var(--primary)',fontSize:20,cursor:'pointer',padding:'0 4px'}}>‹</button>
      <span style={{fontFamily:'var(--fh)',fontSize:13,fontWeight:700,color:'var(--text)'}}>{MESES_L[m]} {y}</span>
      <button onClick={()=>cambiar(1)} style={{background:'none',border:'none',color:'var(--primary)',fontSize:20,cursor:'pointer',padding:'0 4px'}}>›</button>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',marginBottom:4}}>
      {['Lu','Ma','Mi','Ju','Vi','Sa','Do'].map((d,i)=><div key={d} style={{textAlign:'center',fontSize:10,fontWeight:700,color:i>=5?'#dc2626':'var(--t3)',padding:'2px 0'}}>{d}</div>)}
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}}>
      {celdas.map((d,i)=>{
        if(!d)return<div key={i}/>;
        const k=`${y}-${pad(m+1)}-${pad(d)}`;
        const tieneMovs=!!movPorDia[k];
        const selec=diaSelec===k;
        const esHoyD=isHoy(d);
        return<div key={i} onClick={()=>selDia(d)} style={{display:'flex',flexDirection:'column',alignItems:'center',cursor:'pointer',padding:'2px 0'}}>
          <div style={{width:30,height:30,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:esHoyD||selec?700:400,background:esHoyD?'var(--primary)':selec?'var(--pdim)':'transparent',color:esHoyD?'#fff':selec?'var(--primary)':'var(--text)',border:selec&&!esHoyD?'1.5px solid var(--primary)':'none'}}>{d}</div>
          {tieneMovs&&<div style={{width:4,height:4,borderRadius:'50%',background:esHoyD?'#fff':'var(--primary)',marginTop:1,opacity:0.7}}/>}
        </div>;
      })}
    </div>
    {diaSelec&&<div style={{marginTop:10,padding:'10px 12px',background:'var(--card2)',borderRadius:10,border:'0.5px solid var(--border)'}}>
      <div style={{fontSize:11,fontWeight:700,color:'var(--primary)',marginBottom:6}}>{fechaLarga(diaSelec)}</div>
      {movDia.length===0
        ?<div style={{fontSize:12,color:'var(--t3)'}}>Sin movimientos registrados</div>
        :<>
          <div style={{display:'flex',gap:10,marginBottom:6}}>
            {ingDia>0&&<span style={{fontSize:11,color:'#16a34a',fontWeight:600}}>↑ {fmt(ingDia)}</span>}
            {gastDia>0&&<span style={{fontSize:11,color:'#dc2626',fontWeight:600}}>↓ {fmt(gastDia)}</span>}
          </div>
          {movDia.map(mv=><div key={mv.id} style={{display:'flex',justifyContent:'space-between',fontSize:12,padding:'3px 0',borderBottom:'0.5px solid var(--border)'}}>
            <span style={{color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'65%'}}>{mv.desc}</span>

}

/* ══ MODAL MOVIMIENTO (con soporte de edición) ══ */
function ModalMov({tarjetas,onGuardar,onEditar,onClose,tipoInicial,movimiento}){
  const esEdicion=!!movimiento;
  const esCuota=movimiento?.tipo==='cuota';

  const[tipo,setTipo]=useState(esCuota?'gasto':(movimiento?.tipo||tipoInicial||'gasto'));
  const[ent,setEnt]=useState(movimiento?.ent||'negocio');
  const[desc,setDesc]=useState(movimiento?.desc||'');
  const[monto,setMonto]=useState(esCuota?(movimiento?.montoTotal||''):(movimiento?.monto||''));
  const[fecha,setFecha]=useState(movimiento?.fecha||hoy());
  const[metodo,setMetodo]=useState(movimiento?.metodo||'efectivo');
  const[tid,setTid]=useState(movimiento?.tarjetaId||tarjetas[0]?.id||'');
  const[cuotas,setCuotas]=useState(movimiento?.cuotas||1);
  const[cat,setCat]=useState(movimiento?.cat||'');

  const cats=tipo==='ingreso'?CATS.ingreso:(CATS[ent]||[]);

  useEffect(()=>{
    // Solo resetear la categoría si es un movimiento NUEVO (no edición)
    if(!esEdicion)setCat(cats[0]||'');
  },[tipo,ent]);

  const guardar=()=>{
    if(!desc.trim())return alert('Escribí una descripción');
    if(!esCuota&&(!monto||Number(monto)<=0))return alert('Ingresá un monto válido');
    const m=Number(monto);

    if(esEdicion){
      if(esCuota){
        // Para cuotas: solo se puede editar descripción y categoría
        onEditar({...movimiento,desc,cat});
      }else{
        onEditar({...movimiento,tipo,ent,desc,monto:m,fecha,metodo:tipo==='gasto'?metodo:'',tarjetaId:metodo==='tarjeta'&&tipo==='gasto'?tid:'',cat});
      }
    }else{
      if(tipo==='gasto'&&metodo==='tarjeta'&&tid&&cuotas>1){
        const tarj=tarjetas.find(t=>t.id===tid);const mc=Math.round(m/cuotas);
        const venc=Array.from({length:cuotas},(_,i)=>{if(tarj?.diaVenc){const d=new Date(fecha+'T12:00:00');d.setMonth(d.getMonth()+i+1);d.setDate(tarj.diaVenc);return d.toISOString().slice(0,10);}return addM(fecha,i+1);});
        onGuardar({id:uid2(),tipo:'cuota',ent,desc,montoTotal:m,cuotas,montoCuota:mc,tarjetaId:tid,fecha,cat,venc});
      }else{
        onGuardar({id:uid2(),tipo,ent,desc,monto:m,fecha,metodo:tipo==='gasto'?metodo:'',tarjetaId:metodo==='tarjeta'&&tipo==='gasto'?tid:'',cat});
      }
    }
    onClose();
  };

  const mn=Number(monto)||0;
  const titulo=esEdicion?(esCuota?'Editar cuota':'Editar transacción'):'Nueva transacción';

  return<Modal onClose={onClose} title={titulo}>
    {/* Aviso especial para cuotas */}
    {esCuota&&<div style={{background:'#fffbeb',border:'0.5px solid #fde68a',borderRadius:10,padding:'10px 14px',marginBottom:14,fontSize:13,color:'#92400e',lineHeight:1.5}}>
      💳 Cuota {movimiento.cuotas}x de {fmt(movimiento.montoCuota)} (total {fmt(movimiento.montoTotal)}). Solo podés editar la descripción y categoría.
    </div>}

    {/* Tipo y entidad — solo si NO es cuota */}
    {!esCuota&&<>
      <div style={{marginBottom:12}}><Toggle opts={[['gasto','💸 Gasto'],['ingreso','💰 Ingreso']]} val={tipo} onChange={setTipo} cm={{gasto:'var(--danger)',ingreso:'var(--success)'}}/></div>
      <div style={{marginBottom:12}}><Toggle opts={[['personal','👤 Personal'],['negocio','🏭 Negocio']]} val={ent} onChange={setEnt} cm={{personal:'var(--pers)',negocio:'var(--neg)'}}/></div>
    </>}

    {/* Chip de entidad para cuotas (solo lectura) */}
    {esCuota&&<div style={{marginBottom:12}}><ChipP t={movimiento.ent}/></div>}

    <label style={S.lbl}>Descripción</label>
    <input style={{...S.inp,marginBottom:12}} value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Ej: Carga de combustible"/>

    {/* Monto — solo si NO es cuota */}
    {!esCuota&&<>
      <label style={S.lbl}>Monto $</label>
      <input style={{...S.inpR,marginBottom:12}} type="number" inputMode="numeric" value={monto} onChange={e=>setMonto(e.target.value)} placeholder="0"/>
    </>}

    {/* Fecha — solo si NO es cuota */}
    {!esCuota&&<>
      <label style={S.lbl}>Fecha</label>
      <input style={{...S.inp,marginBottom:12}} type="date" value={fecha} onChange={e=>setFecha(e.target.value)}/>
    </>}

    <label style={S.lbl}>Categoría</label>
    <select style={{...S.inp,marginBottom:12}} value={cat} onChange={e=>setCat(e.target.value)}>
      {(esCuota?CATS[movimiento.ent]||[]:cats).map(c=><option key={c} value={c}>{c}</option>)}
    </select>

    {/* Método de pago — solo si NO es edición y es gasto */}
    {!esEdicion&&tipo==='gasto'&&<>
      <label style={S.lbl}>Método de pago</label>
      <div style={{display:'flex',gap:6,marginBottom:12,flexWrap:'wrap'}}>
        {['efectivo','débito','tarjeta','transferencia'].map(mt=><button key={mt} onClick={()=>setMetodo(mt)} style={{padding:'7px 13px',borderRadius:20,border:`1px solid ${metodo===mt?'var(--primary)':'var(--border)'}`,background:metodo===mt?'var(--pdim)':'transparent',color:metodo===mt?'var(--primary)':'var(--t2)',fontSize:12,fontWeight:600,cursor:'pointer'}}>{mt}</button>)}
      </div>
      {metodo==='tarjeta'&&<>
        <label style={S.lbl}>Tarjeta</label>
        {tarjetas.length===0?<div style={{background:'#fffbeb',border:'0.5px solid #fde68a',borderRadius:10,padding:'10px 14px',fontSize:13,color:'#92400e',marginBottom:12}}>⚠️ Primero agregá una tarjeta</div>
          :<select style={{...S.inp,marginBottom:12}} value={tid} onChange={e=>setTid(e.target.value)}>{tarjetas.map(t=><option key={t.id} value={t.id}>{t.nombre}</option>)}</select>}
        {tid&&<>
          <label style={S.lbl}>Cuotas</label>
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:12}}>
            {[1,2,3,6,9,12,18,24].map(n=><button key={n} onClick={()=>setCuotas(n)} style={{padding:'7px 12px',borderRadius:20,border:`1px solid ${cuotas===n?'var(--primary)':'var(--border)'}`,background:cuotas===n?'var(--pdim)':'transparent',color:cuotas===n?'var(--primary)':'var(--t2)',fontSize:12,fontWeight:600,cursor:'pointer'}}>{n===1?'1 pago':`${n}x`}</button>)}
          </div>
          {cuotas>1&&mn>0&&<div style={{background:'#f0fdf4',border:'0.5px solid #bbf7d0',borderRadius:10,padding:'10px 14px',marginBottom:12}}>
            <span style={{fontSize:14,color:'#15803d',fontWeight:700}}>{cuotas} cuotas de {fmt(Math.round(mn/cuotas))}</span>
            <span style={{fontSize:12,color:'var(--t2)',marginLeft:8}}>= {fmt(mn)} total</span>
          </div>}
        </>}
      </>}
    </>}

    {/* En edición de gasto/ingreso normal: mostrar método como solo lectura */}
    {esEdicion&&!esCuota&&movimiento.metodo&&<>
      <label style={S.lbl}>Método de pago</label>
      <div style={{...S.inp,marginBottom:12,color:'var(--t2)',fontSize:13,display:'flex',alignItems:'center'}}>
        {movimiento.metodo} <span style={{marginLeft:8,fontSize:11,color:'var(--t3)'}}>(no editable)</span>
      </div>
    </>}

    <button style={{...S.btnP,marginTop:8}} onClick={guardar}>
      {esEdicion?'Guardar cambios':(tipo==='gasto'?'Registrar gasto':'Registrar ingreso')}
    </button>
  </Modal>;
}

/* ══ DASHBOARD ══ */
function Dashboard({movs,fijos,pagos,tarjetas,onNuevo,onVerIngresos,onVerEgresos,onVerArqueo}){
  const[presup,setPresup]=useState(()=>Number(localStorage.getItem('ec_presupuesto'))||0);
  const mesK=mk(hoy());
  const movMes=movs.filter(m=>mk(m.fecha)===mesK);
  const ingresos=movMes.filter(m=>m.tipo==='ingreso').reduce((a,m)=>a+m.monto,0);
  const gastosVar=movMes.filter(m=>m.tipo==='gasto').reduce((a,m)=>a+m.monto,0);
  const cuotasMes=movs.filter(m=>m.tipo==='cuota'&&(m.venc||[]).some(v=>mk(v)===mesK));
  const totCuotas=cuotasMes.reduce((a,m)=>a+m.montoCuota,0);
  const pagosMes=(pagos||[]).filter(p=>p.mes===mesK);
  const totFijoPag=pagosMes.reduce((a,p)=>a+p.monto,0);
  const fijosPend=fijos.filter(f=>f.activo&&!pagosMes.find(p=>p.gastoFijoId===f.id));
  const totPend=fijosPend.reduce((a,f)=>a+f.monto,0);
  const totEgresos=gastosVar;
  const balance=ingresos-totEgresos;
  const cb=balance>=0?'var(--success)':'var(--danger)';
  const anioActual=new Date().getFullYear().toString();
  const movAnio=movs.filter(m=>m.fecha&&m.fecha.startsWith(anioActual));
  const ingAnio=movAnio.filter(m=>m.tipo==='ingreso').reduce((a,m)=>a+m.monto,0);
  const gasAnio=movAnio.filter(m=>m.tipo==='gasto').reduce((a,m)=>a+m.monto,0);
  const totPagosAnio=(pagos||[]).filter(p=>p.mes&&p.mes.startsWith(anioActual)).reduce((a,p)=>a+p.monto,0);
  const balAnio=ingAnio-gasAnio;

  const venc=[];
  movs.filter(m=>m.tipo==='cuota'&&!m.saldada).forEach(m=>{const pagados=movs.filter(g=>g.tipo==='gasto'&&g.cuotaId===m.id).length;(m.venc||[]).forEach((v,i)=>{if(i<pagados)return;const d=dh(v);if(d>=0&&d<=14)venc.push({label:`${m.desc} (${i+1}/${m.cuotas})`,monto:m.montoCuota,d,ico:'💳'});});});
  fijosPend.forEach(f=>{const[y,mo]=hoy().split('-');const fv=`${y}-${mo}-${pad(f.diaVenc)}`;const d=dh(fv);if(d>=-2&&d<=14)venc.push({label:f.nombre,monto:f.monto,d,ico:'📌'});});
  venc.sort((a,b)=>a.d-b.d);

  return<div style={S.scr}>
    <div style={{padding:'16px 18px 14px',background:'var(--card)',borderBottom:'0.5px solid var(--border)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
        <div>
          <div style={{fontFamily:'var(--fh)',fontSize:'0.6rem',color:'var(--t3)',fontWeight:700,letterSpacing:'0.12em',textTransform:'uppercase',marginBottom:2}}>Emma Control</div>
          <div style={{fontFamily:'var(--fh)',fontSize:'1.05rem',fontWeight:800,color:'var(--text)'}}>{fechaLarga(hoy())}</div>
          <div style={{fontSize:'0.75rem',color:'var(--t2)',marginTop:1}}>{mlabel(mesK)}</div>
        </div>
        <div style={{textAlign:'right'}}>
          <div style={{display:'inline-block',textAlign:'right',background:balance>=0?'var(--sdim)':'var(--ddim)',border:'1px solid '+(balance>=0?'var(--sborder)':'var(--dborder)'),borderRadius:12,padding:'8px 12px'}}>
            <div style={{fontSize:'0.58rem',color:'var(--t3)',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.04em',marginBottom:3}}>Balance del mes</div>
            <div style={{fontFamily:'var(--fn)',fontSize:'1.5rem',fontWeight:800,color:cb,letterSpacing:'-0.02em',lineHeight:1}}>{fmt(balance)}</div>
          </div>
        </div>
      </div>
      <div onClick={onVerArqueo} style={{display:'flex',justifyContent:'space-between',alignItems:'center',background:'var(--pdim)',borderRadius:10,padding:'8px 12px',border:'0.5px solid var(--pborder)',cursor:'pointer'}}>
        <div>
          <div style={{fontSize:'0.6rem',color:'var(--primary)',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:1}}>Acumulado {new Date().getFullYear()}</div>
          <div style={{fontFamily:'var(--fn)',fontSize:'1rem',fontWeight:700,color:balAnio>=0?'var(--success)':'var(--danger)',letterSpacing:'-0.02em'}}>{fmt(balAnio)}</div>
        </div>
        <div style={{textAlign:'right'}}>
          <div style={{fontSize:'0.6rem',color:'var(--t3)',marginBottom:2}}>↑{fmt(ingAnio)} ↓{fmt(gasAnio)}</div>
          <div style={{fontSize:'0.7rem',color:'var(--primary)',fontWeight:600}}>Ver arqueo →</div>
        </div>
      </div>
    </div>

    <div style={{padding:'14px 14px 0'}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}}>
        <div onClick={onVerIngresos} style={{...S.card2,cursor:'pointer',borderColor:'var(--sborder)',background:'#f0fdf4'}}>
          <div style={{fontSize:9,color:'#166534',fontWeight:700,marginBottom:3,textTransform:'uppercase',letterSpacing:'0.05em'}}>↑ Ingresos</div>
          <div style={{fontFamily:'var(--fn)',fontSize:17,fontWeight:700,color:'#16a34a',letterSpacing:'-0.02em'}}>{fmt(ingresos)}</div>
          <div style={{fontSize:10,color:'#4ade80',marginTop:3}}>Ver detalle →</div>
        </div>
        <div onClick={onVerEgresos} style={{...S.card2,cursor:'pointer',borderColor:'var(--dborder)',background:'#fef2f2'}}>
          <div style={{fontSize:9,color:'#991b1b',fontWeight:700,marginBottom:3,textTransform:'uppercase',letterSpacing:'0.05em'}}>↓ Egresos</div>
          <div style={{fontFamily:'var(--fn)',fontSize:17,fontWeight:700,color:'#dc2626',letterSpacing:'-0.02em'}}>{fmt(totEgresos)}</div>
          <div style={{fontSize:10,color:'#f87171',marginTop:3}}>Ver detalle →</div>
        </div>
      </div>

      {(()=>{
        const ed=()=>{const v=window.prompt('Presupuesto de gastos del mes ($):',presup||'');if(v!==null){const n=Math.max(0,Number(v)||0);setPresup(n);localStorage.setItem('ec_presupuesto',n);}};
        if(!presup)return<div onClick={ed} style={{...S.card2,marginBottom:12,display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer',borderStyle:'dashed'}}><span style={{fontSize:13,color:'var(--t2)',fontWeight:500}}>🎯 Definir presupuesto del mes</span><span style={{fontSize:12,color:'var(--primary)',fontWeight:600}}>Definir →</span></div>;
        const pct=Math.min(100,Math.round(totEgresos/presup*100));const exc=totEgresos>presup;const col=exc?'#dc2626':pct>=80?'#d97706':'#16a34a';
        return<div style={{...S.card,marginBottom:12}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}><span style={{...S.st}}>🎯 Presupuesto del mes</span><button onClick={ed} style={{background:'var(--pdim)',border:'none',color:'var(--primary)',fontSize:11,fontWeight:600,cursor:'pointer',padding:'3px 8px',borderRadius:8}}>Editar</button></div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:6}}><span style={{fontFamily:'var(--fn)',fontSize:'1.1rem',fontWeight:700,color:col}}>{fmt(totEgresos)}</span><span style={{fontSize:12,color:'var(--t2)'}}>de {fmt(presup)}</span></div>
          <div style={{height:8,borderRadius:6,background:'var(--pdim)',overflow:'hidden'}}><div style={{height:'100%',width:pct+'%',background:col,borderRadius:6,transition:'width 0.3s'}}/></div>
          {exc?<div style={{fontSize:12,color:'#dc2626',fontWeight:600,marginTop:7}}>⚠️ Te pasaste por {fmt(totEgresos-presup)}</div>:<div style={{fontSize:12,color:'var(--t2)',marginTop:7}}>Te quedan {fmt(presup-totEgresos)} ({100-pct}%)</div>}
        </div>;
      })()}
      {totPend>0&&<div style={{...S.card2,marginBottom:12,background:'#fffbeb',borderColor:'#fde68a',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:13,color:'#92400e',fontWeight:500}}>📌 Gastos fijos pendientes</span>
        <span style={{fontFamily:'var(--fn)',fontSize:15,fontWeight:700,color:'#d97706',letterSpacing:'-0.01em'}}>{fmt(totPend)}</span>
      </div>}

      <Calendario movimientos={movs}/>

      {venc.length>0&&<div style={{...S.card,marginTop:12}}>
        <div style={{...S.st,marginBottom:10}}>⚠️ Próximos vencimientos</div>
        {venc.slice(0,4).map((v,i)=><div key={i} style={{...S.row,borderBottom:i<Math.min(venc.length,4)-1?'0.5px solid #f0eeff':'none'}}>
          <div>
            <div style={{fontSize:13,fontWeight:500,color:'var(--text)'}}>{v.ico} {v.label}</div>
            <div style={{fontSize:11,color:v.d<=0?'#dc2626':v.d<=3?'#d97706':'var(--t2)',marginTop:1}}>{v.d<0?`Venció hace ${-v.d}d`:v.d===0?'¡Hoy!':v.d===1?'Mañana':`En ${v.d} días`}</div>
          </div>
          <div style={{fontWeight:700,fontSize:14,color:v.d<=3?'#dc2626':'var(--text)'}}>{fmt(v.monto)}</div>
        </div>)}
      </div>}
    </div>
    <FAB onClick={onNuevo}/>
  </div>;
}

/* ══ DETALLE INGRESOS ══ */
function DetalleIngresos({movs,onNuevo,onEditar,onEliminar,onVolver}){
  const mesK=mk(hoy());
  const[mes,setMes]=useState(mesK);
  const meses=useMemo(()=>{const s=new Set(movs.filter(m=>m.tipo==='ingreso').map(m=>mk(m.fecha)));s.add(mesK);return[...s].sort().reverse();},[movs]);
  const lista=movs.filter(m=>m.tipo==='ingreso'&&mk(m.fecha)===mes).sort((a,b)=>b.fecha.localeCompare(a.fecha));
  const total=lista.reduce((a,m)=>a+m.monto,0);
  const porCat=useMemo(()=>{const r={};lista.forEach(m=>{r[m.cat]=(r[m.cat]||0)+m.monto;});return Object.entries(r).sort((a,b)=>b[1]-a[1]);},[lista]);
  const icoMetodo={efectivo:'💵',tarjeta:'💳',débito:'💳',transferencia:'📲'};

  const porDia=useMemo(()=>{const r={};lista.forEach(m=>{if(!r[m.fecha])r[m.fecha]=[];r[m.fecha].push(m);});return r;},[lista]);
  const dias=useMemo(()=>Object.keys(porDia).sort((a,b)=>b.localeCompare(a)),[porDia]);

  return<div style={{...S.scr,WebkitOverflowScrolling:'touch'}} data-scroll="1">

/* ══ DETALLE EGRESOS ══ */
function DetalleEgresos({movs,tarjetas,onNuevo,onEditar,onEliminar,onVolver}){
  const mesK=mk(hoy());
  const[mes,setMes]=useState(mesK);
  const[filtEnt,setFiltEnt]=useState('todos');
  const meses=useMemo(()=>{const s=new Set(movs.filter(m=>m.tipo==='gasto'||m.tipo==='cuota').map(m=>mk(m.fecha)));s.add(mesK);return[...s].sort().reverse();},[movs]);

  const gastos=movs.filter(m=>m.tipo==='gasto'&&mk(m.fecha)===mes);
  const cuotas=movs.filter(m=>m.tipo==='cuota'&&(m.venc||[]).some(v=>mk(v)===mes));

  const lista=[...gastos].filter(m=>filtEnt==='todos'||m.ent===filtEnt).sort((a,b)=>b.fecha.localeCompare(a.fecha));

  const total=lista.reduce((a,m)=>a+m.monto,0);
  const totP=lista.filter(m=>m.ent==='personal').reduce((a,m)=>a+m.monto,0);
  const totN=lista.filter(m=>m.ent==='negocio').reduce((a,m)=>a+m.monto,0);
  const porCat=useMemo(()=>{const r={};lista.forEach(m=>{r[m.cat]=(r[m.cat]||0)+m.monto;});return Object.entries(r).sort((a,b)=>b[1]-a[1]);},[lista]);
  const icoMetodo={efectivo:'💵',tarjeta:'💳',débito:'💳',transferencia:'📲'};

  const porDia=useMemo(()=>{const r={};lista.forEach(m=>{if(!r[m.fecha])r[m.fecha]=[];r[m.fecha].push(m);});return r;},[lista]);
  const dias=useMemo(()=>Object.keys(porDia).sort((a,b)=>b.localeCompare(a)),[porDia]);

  // Para editar un egreso: si es cuota, busca el original en movs por id
  const editarEgreso=m=>{
    if(m._cuota){

        <div style={{fontFamily:'var(--fn)',fontSize:26,fontWeight:700,color:'#dc2626',letterSpacing:'-0.02em'}}>{fmt(total)}</div>
        <div style={{display:'flex',gap:14,marginTop:4}}>
          <span style={{fontSize:11,color:'#991b1b'}}>Personal <b>{fmt(totP)}</b></span>
          <span style={{fontSize:11,color:'#991b1b'}}>Negocio <b>{fmt(totN)}</b></span>
        </div>
      </div>
      <div style={{display:'flex',gap:6}}>
        {[['todos','Todos'],['personal','Personal'],['negocio','Negocio']].map(([v,l])=><button key={v} onClick={()=>setFiltEnt(v)} style={{flex:1,padding:'7px 0',borderRadius:20,fontSize:12,fontWeight:600,cursor:'pointer',border:`1px solid ${filtEnt===v?'var(--primary)':'var(--border)'}`,background:filtEnt===v?'var(--pdim)':'transparent',color:filtEnt===v?'var(--primary)':'var(--t2)'}}>{l}</button>)}
      </div>
    </div>
    <div style={{padding:'14px 14px 0'}}>
      {porCat.length>0&&<><div style={{...S.st,marginBottom:8}}>Por categoría</div>
      <div style={{...S.card,marginBottom:12,padding:'10px 14px'}}>
        {porCat.map(([cat,v],i)=><div key={cat} style={{...S.row,borderBottom:i<porCat.length-1?'0.5px solid #f0eeff':'none'}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <div style={{width:8,height:8,borderRadius:'50%',background:`hsl(${0+i*25},65%,50%)`,flexShrink:0}}/>
            <span style={{fontSize:13,color:'var(--text)'}}>{cat}</span>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontFamily:'var(--fn)',fontSize:13,fontWeight:700,color:'#dc2626'}}>{fmt(v)}</div>
            {total>0&&<div style={{fontSize:10,color:'var(--t3)'}}>{Math.round(v/total*100)}%</div>}
          </div>
        </div>)}
      </div></>}
      <div style={{...S.st,marginBottom:4}}>Todos los egresos</div>
      {lista.length===0&&<div style={{textAlign:'center',padding:'30px 0',color:'var(--t3)',fontSize:14}}>Sin egresos este mes</div>}
      {dias.map((dia,i)=><div key={dia}>

        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0 8px'}}>

          <div style={{width:36,height:36,borderRadius:10,background:m._cuota?'#fffbeb':'#fef2f2',border:`0.5px solid ${m._cuota?'#fde68a':'#fecaca'}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0}}>
            {m._cuota?'💳':icoMetodo[m.metodo]||'💸'}
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:14,fontWeight:600,color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{m.desc}</div>

            {!m._cuota&&<button onClick={()=>{if(window.confirm('¿Eliminar este egreso?'))onEliminar(m.id);}} style={{background:'#fef2f2',border:'none',color:'#dc2626',fontSize:16,cursor:'pointer',width:30,height:30,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center'}}>🗑️</button>}

/* ══ MOVIMIENTOS ══ */
function Movimientos({movs,onNuevo,onEliminar,onEditar}){
  const[filtT,setFiltT]=useState('todos');const[filtE,setFiltE]=useState('todos');const[mes,setMes]=useState(mk(hoy()));const[busq,setBusq]=useState('');
  const meses=useMemo(()=>{const s=new Set(movs.map(m=>mk(m.fecha)));s.add(mk(hoy()));return[...s].sort().reverse();},[movs]);
  const lista=useMemo(()=>movs.filter(m=>(busq.trim()!==''||mk(m.fecha)===mes)&&(filtT==='todos'||m.tipo===filtT)&&(filtE==='todos'||m.ent===filtE)&&(busq.trim()===''||((m.desc||'')+' '+(m.cat||'')).toLowerCase().includes(busq.trim().toLowerCase()))).sort((a,b)=>b.fecha.localeCompare(a.fecha)),[movs,mes,filtT,filtE,busq]);
  const totI=lista.filter(m=>m.tipo==='ingreso').reduce((a,m)=>a+m.monto,0);
  const totG=lista.filter(m=>m.tipo==='gasto').reduce((a,m)=>a+m.monto,0);
  const icoM={tarjeta:'💳',efectivo:'💵',débito:'💳',transferencia:'📲'};

  const porDia=useMemo(()=>{
    const r={};
    lista.forEach(m=>{if(!r[m.fecha])r[m.fecha]=[];r[m.fecha].push(m);});
    return r;
  },[lista]);
  const dias=useMemo(()=>Object.keys(porDia).sort((a,b)=>b.localeCompare(a)),[porDia]);

      <select value={mes} onChange={e=>setMes(e.target.value)} style={{...S.inp,marginBottom:10,fontSize:13}}>{meses.map(m=><option key={m} value={m}>{mlabel(m)}</option>)}</select>
      <div style={{display:'flex',gap:6,marginBottom:8}}>
        {[['todos','Todos'],['gasto','Gastos'],['ingreso','Ingresos']].map(([v,l])=><button key={v} onClick={()=>setFiltT(v)} style={{flex:1,padding:'7px 0',borderRadius:20,fontSize:12,fontWeight:600,cursor:'pointer',border:`1px solid ${filtT===v?'var(--primary)':'var(--border)'}`,background:filtT===v?'var(--pdim)':'transparent',color:filtT===v?'var(--primary)':'var(--t2)'}}>{l}</button>)}
      </div>
      <div style={{display:'flex',gap:6}}>
        {[['todos','Todos'],['personal','Personal'],['negocio','Negocio']].map(([v,l])=><button key={v} onClick={()=>setFiltE(v)} style={{flex:1,padding:'6px 0',borderRadius:20,fontSize:11,fontWeight:600,cursor:'pointer',border:`1px solid ${filtE===v?'var(--info)':'var(--border)'}`,background:filtE===v?'var(--idim)':'transparent',color:filtE===v?'var(--info)':'var(--t2)'}}>{l}</button>)}
      </div>
    </div>
    <div style={{padding:'12px 14px 0'}}>
      <div style={{display:'flex',gap:8,marginBottom:12}}>
        {[['Ingresos',totI,'#16a34a'],['Gastos',totG,'#dc2626'],['Balance',totI-totG,(totI-totG)>=0?'#16a34a':'#dc2626']].map(([l,v,c])=><div key={l} style={{flex:1,...S.card2,textAlign:'center',padding:'10px 6px'}}>
          <div style={{fontSize:9,color:'var(--t2)',marginBottom:3,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.04em'}}>{l}</div>

      {dias.map((dia,i)=><div key={dia}>
        {i>0&&<div style={{display:'flex',alignItems:'center',gap:8,margin:'12px 0 0'}}>
          <div style={{flex:1,height:'1.5px',background:'var(--border)'}}/>
        </div>}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 0 8px'}}>
          <div style={{fontFamily:'var(--fh)',fontSize:17,fontWeight:800,color:'var(--text)',letterSpacing:'-0.01em'}}>{fechaLarga(dia)}</div>
          <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:2}}>
            {(()=>{
              const di=porDia[dia].filter(m=>m.tipo==='ingreso').reduce((a,m)=>a+m.monto,0);
              const dg=porDia[dia].filter(m=>m.tipo==='gasto').reduce((a,m)=>a+m.monto,0);
              return[
                di>0&&<span key='i' style={{fontFamily:'var(--fn)',fontSize:12,fontWeight:700,color:'#16a34a'}}>+{fmt(di)}</span>,
                dg>0&&<span key='g' style={{fontFamily:'var(--fn)',fontSize:12,fontWeight:700,color:'#dc2626'}}>-{fmt(dg)}</span>
              ];
            })()}
          </div>
        </div>
        {porDia[dia].map(m=><div key={m.id} style={{...S.card,marginBottom:8,display:'flex',alignItems:'center',gap:10}}>

          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:14,fontWeight:500,color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{m.desc}</div>
            <div style={{display:'flex',gap:5,marginTop:2,flexWrap:'wrap',alignItems:'center'}}><ChipP t={m.ent} sm/>{m.cat&&<span style={{fontSize:10,color:'var(--t3)'}}>{m.cat}</span>}</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
            <div style={{fontFamily:'var(--fn)',fontWeight:700,fontSize:15,color:m.tipo==='ingreso'?'#16a34a':'#dc2626',letterSpacing:'-0.01em'}}>{m.tipo==='ingreso'?'+':'-'}{fmt(m.monto)}</div>
            {/* ✏️ Botón editar */}
            <button onClick={()=>onEditar(m)} style={{background:'var(--pdim)',border:'none',color:'var(--primary)',fontSize:14,cursor:'pointer',width:30,height:30,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center'}}>✏️</button>
            <button onClick={()=>onEliminar(m.id)} style={{background:'none',border:'none',color:'var(--t3)',fontSize:18,cursor:'pointer',padding:'2px 4px'}}>✕</button>
          </div>
        </div>)}
      </div>)}
    </div>
    <FAB onClick={()=>onNuevo()}/>
  </div>;
}

/* ══ TARJETAS ══ */
function Tarjetas({tarjetas,movs,onAgregar,onEditar,onEliminar,onSaldarCuota,onEliminarCuota,onPagarCuota}){
  const mes=mk(hoy());const[exp,setExp]=useState(null);
  const deuda=useMemo(()=>movs.filter(m=>m.tipo==='cuota'&&!m.saldada).reduce((a,m)=>{const r=(m.venc||[]).filter(v=>dh(v)>=0).length;return a+r*m.montoCuota;},0),[movs]);
  const pendXT=useMemo(()=>{const r={};movs.filter(m=>m.tipo==='cuota'&&!m.saldada).forEach(m=>{const rest=(m.venc||[]).filter(v=>dh(v)>=0).length;if(rest>0){(r[m.tarjetaId]=r[m.tarjetaId]||[]).push({...m,rest,restMonto:rest*m.montoCuota});}});return r;},[movs]);
  const orphan=useMemo(()=>{const ids=new Set(tarjetas.map(t=>t.id));return movs.filter(m=>m.tipo==='cuota'&&!m.saldada&&!ids.has(m.tarjetaId)).map(m=>{const rest=(m.venc||[]).filter(v=>dh(v)>=0).length;return{...m,rest,restMonto:rest*m.montoCuota};}).filter(m=>m.rest>0);},[movs,tarjetas]);
  const cxT=useMemo(()=>{const r={};movs.filter(m=>m.tipo==='cuota'&&!m.saldada).forEach(m=>{if(!r[m.tarjetaId])r[m.tarjetaId]=[];const i=(m.venc||[]).findIndex(v=>mk(v)===mes);if(i>=0)r[m.tarjetaId].push({...m,ca:i+1});});return r;},[movs,mes]);
  return<div style={S.scr}>
    <div style={{padding:'14px 16px 12px',background:'var(--card)',borderBottom:'0.5px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <span style={{fontFamily:'var(--fh)',fontSize:18,fontWeight:800,color:'var(--text)'}}>Tarjetas</span>
      <button onClick={onAgregar} style={{...S.btn,background:'var(--primary)',color:'#fff',border:'none',fontWeight:700}}>+ Agregar</button>
    </div>
    <div style={{padding:'14px 14px 0'}}>
      {deuda>0&&<div style={{...S.card,background:'#fef2f2',border:'0.5px solid #fecaca',marginBottom:14,textAlign:'center'}}>

}

/* ══ GASTOS FIJOS ══ */
function GastosFijos({fijos,movs,setMovs,onAgregar,onEditar,onEliminar}){
  const mes=mk(hoy());const[filtro,setFiltro]=useState('todos');
  const pagado=f=>(movs||[]).some(m=>m.fijoId===f.id&&m.fijoMes===mes);
  const totF=fijos.filter(f=>f.activo).reduce((a,f)=>a+f.monto,0);
  const totP=fijos.filter(f=>f.activo&&pagado(f)).reduce((a,f)=>a+f.monto,0);
  const totPend=fijos.filter(f=>f.activo&&!pagado(f)).reduce((a,f)=>a+f.monto,0);
  const toggle=f=>{if(pagado(f)){setMovs(prev=>prev.filter(m=>!(m.fijoId===f.id&&m.fijoMes===mes)));}else{if(!window.confirm('¿Confirmás el pago de '+f.nombre+' ('+fmt(f.monto)+')? Se registra como gasto.'))return;setMovs(prev=>[...prev,{id:uid2(),tipo:'gasto',desc:f.nombre,monto:f.monto,fecha:hoy(),cat:f.cat||'Gasto fijo',ent:f.entidad||'personal',fijoId:f.id,fijoMes:mes}]);}};
  const lista=fijos.filter(f=>filtro==='todos'||f.entidad===filtro);
  const getD=f=>{const[y,mo]=hoy().split('-');return dh(`${y}-${mo}-${pad(f.diaVenc)}`);};
  const bc=(f,pag)=>{if(pag)return'var(--primary)';const d=getD(f);return d<=0?'#dc2626':d<=5?'#d97706':'var(--border)';};
  return<div style={S.scr}>
    <div style={{padding:'14px 16px 12px',background:'var(--card)',borderBottom:'0.5px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <span style={{fontFamily:'var(--fh)',fontSize:18,fontWeight:800,color:'var(--text)'}}>Gastos fijos</span>
      <button onClick={onAgregar} style={{...S.btn,background:'var(--primary)',color:'#fff',border:'none',fontWeight:700}}>+ Agregar</button>
    </div>
    <div style={{padding:'14px 14px 0'}}>
      <div style={{display:'flex',gap:8,marginBottom:14}}>
        {[['Total',totF,'var(--text)'],['Pagado',totP,'#16a34a'],['Pendiente',totPend,'#d97706']].map(([l,v,c])=><div key={l} style={{flex:1,...S.card2,textAlign:'center',padding:'10px 6px'}}>
          <div style={{fontSize:9,color:'var(--t2)',marginBottom:3,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.04em'}}>{l}</div>
          <div style={{fontFamily:'var(--fn)',fontSize:14,fontWeight:700,color:c,letterSpacing:'-0.01em'}}>{fmt(v)}</div>
        </div>)}
      </div>
      <div style={{display:'flex',gap:6,marginBottom:12}}>
        {[['todos','Todos'],['personal','Personal'],['negocio','Negocio']].map(([v,l])=><button key={v} onClick={()=>setFiltro(v)} style={{flex:1,padding:'7px 0',borderRadius:20,fontSize:12,fontWeight:600,cursor:'pointer',border:`1px solid ${filtro===v?'var(--primary)':'var(--border)'}`,background:filtro===v?'var(--pdim)':'transparent',color:filtro===v?'var(--primary)':'var(--t2)'}}>{l}</button>)}
      </div>
      {lista.length===0&&<div style={{textAlign:'center',padding:'30px 0',color:'var(--t3)',fontSize:14}}>Sin gastos fijos</div>}
      {lista.map(f=>{const pag=pagado(f);const d=getD(f);
        return<div key={f.id} style={{...S.card,marginBottom:10,borderLeft:`3px solid ${bc(f,pag)}`,opacity:pag?0.8:1}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:3}}><span style={{fontSize:14,fontWeight:600,color:'var(--text)'}}>{f.nombre}</span><ChipP t={f.entidad} sm/></div>
              <div style={{fontSize:11,color:'var(--t3)'}}>Día {f.diaVenc} · {f.cat}</div>
              {!pag&&<div style={{fontSize:11,color:bc(f,pag),marginTop:1,fontWeight:500}}>{d<0?`Venció hace ${-d}d`:d===0?'¡Hoy!':d===1?'Mañana':`En ${d} días`}</div>}
            </div>
            <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
              <span style={{fontSize:15,fontWeight:700,color:pag?'#16a34a':'var(--text)'}}>{fmt(f.monto)}</span>
              <button onClick={()=>toggle(f)} style={{padding:'7px 10px',borderRadius:10,border:`1px solid ${pag?'#bbf7d0':'var(--border)'}`,fontSize:12,fontWeight:700,cursor:'pointer',background:pag?'#f0fdf4':'var(--card2)',color:pag?'#16a34a':'var(--t2)'}}>{pag?'✓ Pagado':'Pagar'}</button>
              <button onClick={()=>onEditar(f)} style={{background:'none',border:'none',color:'var(--t3)',fontSize:15,cursor:'pointer'}}>✏️</button>
              <button onClick={()=>onEliminar(f.id)} style={{background:'none',border:'none',color:'var(--t3)',fontSize:15,cursor:'pointer'}}>✕</button>
            </div>
          </div>
        </div>;
      })}
    </div>
  </div>;
}

/* ══ ARQUEO ══ */
function Arqueo({movs,pagos,onVolver}){
  const anio=new Date().getFullYear();
  const[efectivoReal,setEfectivoReal]=useState('');
  const[mostrarRes,setMostrarRes]=useState(false);

  const movAnio=movs.filter(m=>m.fecha&&m.fecha.startsWith(anio));
  const ingAnio=movAnio.filter(m=>m.tipo==='ingreso').reduce((a,m)=>a+m.monto,0);
  const gasAnio=movAnio.filter(m=>m.tipo==='gasto').reduce((a,m)=>a+m.monto,0);
  const balanceAnio=ingAnio-gasAnio;

  const meses={};
  movAnio.forEach(m=>{
    const mes=m.fecha.slice(0,7);
    if(!meses[mes])meses[mes]={ing:0,gas:0};
    if(m.tipo==='ingreso')meses[mes].ing+=m.monto;
    else if(m.tipo==='gasto')meses[mes].gas+=m.monto;
  });

  const diferencia=efectivoReal?Number(efectivoReal)-balanceAnio:null;

  return<div style={S.scr}>
    <div style={{padding:'14px 16px 12px',background:'var(--card)',borderBottom:'0.5px solid var(--border)'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:4}}>
        <button onClick={onVolver} style={{background:'var(--pdim)',border:'none',color:'var(--primary)',fontSize:'1.1rem',cursor:'pointer',width:34,height:34,borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center'}}>←</button>
        <span style={{fontFamily:'var(--fh)',fontSize:'1.1rem',fontWeight:800,color:'var(--text)'}}>Arqueo {anio}</span>
      </div>
    </div>
    <div style={{padding:'14px 14px 0'}}>
      <div style={{...S.card,marginBottom:12}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
          <div style={{background:'var(--sdim)',borderRadius:12,padding:'13px 12px',border:'0.5px solid var(--sborder)'}}>
            <div style={{fontSize:'0.65rem',color:'var(--success)',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.03em',marginBottom:5}}>↑ Ingresos</div>
            <div style={{fontFamily:'var(--fn)',fontSize:'1.5rem',fontWeight:800,color:'var(--success)',letterSpacing:'-0.02em'}}>{fmt(ingAnio)}</div>
          </div>
          <div style={{background:'var(--ddim)',borderRadius:12,padding:'13px 12px',border:'0.5px solid var(--dborder)'}}>
            <div style={{fontSize:'0.65rem',color:'var(--danger)',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.03em',marginBottom:5}}>↓ Egresos</div>
            <div style={{fontFamily:'var(--fn)',fontSize:'1.5rem',fontWeight:800,color:'var(--danger)',letterSpacing:'-0.02em'}}>{fmt(gasAnio)}</div>
          </div>
        </div>
        <div style={{background:'var(--pdim)',border:'1px solid var(--pborder)',borderRadius:12,padding:'12px 14px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{fontSize:'0.65rem',color:'var(--primary)',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.07em'}}>Sobrante {anio}</div>
          <div style={{fontFamily:'var(--fh)',fontSize:'1.5rem',fontWeight:800,color:balanceAnio>=0?'var(--success)':'var(--danger)'}}>{fmt(balanceAnio)}</div>
        </div>
      </div>

      {(()=>{
        const ks=Object.keys(meses).sort();if(ks.length===0)return null;
        const MA=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
        const mx=Math.max(1,...ks.map(k=>Math.max(meses[k].ing,meses[k].gas)));
        const W=320,H=140,gap=(W-8)/ks.length,bw=Math.max(5,Math.min(15,gap/2.6));
        return<div style={{...S.card,marginBottom:12}}>
          <div style={{...S.st,marginBottom:10}}>Ingresos vs Egresos</div>
          <svg width="100%" viewBox={`0 0 ${W} ${H+16}`} style={{display:'block'}}>
            {ks.map((k,i)=>{const x=4+i*gap+gap/2;const ih=(meses[k].ing/mx)*H;const gh=(meses[k].gas/mx)*H;return<g key={k}><rect x={x-bw-1} y={H-ih} width={bw} height={ih} rx="2" fill="#16a34a"/><rect x={x+1} y={H-gh} width={bw} height={gh} rx="2" fill="#dc2626"/><text x={x} y={H+12} fontSize="10" fill="var(--t2)" textAnchor="middle" fontWeight="600">{MA[+k.slice(5)-1]}</text></g>;})}
          </svg>
          <div style={{display:'flex',gap:16,justifyContent:'center',marginTop:8}}>
            <span style={{fontSize:11,color:'var(--t2)',display:'flex',alignItems:'center',gap:4}}><span style={{width:9,height:9,borderRadius:2,background:'#16a34a',display:'inline-block'}}/>Ingresos</span>
            <span style={{fontSize:11,color:'var(--t2)',display:'flex',alignItems:'center',gap:4}}><span style={{width:9,height:9,borderRadius:2,background:'#dc2626',display:'inline-block'}}/>Egresos</span>
          </div>
        </div>;
      })()}
      <div style={{...S.card,marginBottom:12}}>
        <div style={{...S.st,marginBottom:10}}>Mes a mes</div>
        {Object.entries(meses).sort().map(([mes,v],i,arr)=>{
          const bal=v.ing-v.gas;
          return<div key={mes} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:i<arr.length-1?'0.5px solid var(--border)':'none'}}>
            <span style={{fontSize:'0.85rem',color:'var(--text)',fontWeight:700}}>{['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][+mes.slice(5)-1]} {mes.slice(0,4)}</span>
            <div style={{textAlign:'right'}}>
              <div style={{fontFamily:'var(--fn)',fontSize:'1rem',fontWeight:800,color:bal>=0?'var(--success)':'var(--danger)',letterSpacing:'-0.02em'}}>{fmt(bal)}</div>
              <div style={{fontSize:'0.7rem',marginTop:2,display:'flex',gap:8,justifyContent:'flex-end'}}>
                <span style={{color:'var(--success)',fontWeight:600}}>↑{fmt(v.ing)}</span>
                <span style={{color:'var(--danger)',fontWeight:600}}>↓{fmt(v.gas)}</span>
              </div>
            </div>
          </div>;
        })}
      </div>

      <div style={{...S.card,marginBottom:12}}>
        <div style={{...S.st,marginBottom:10}}>🧾 Arqueo de caja</div>
        <div style={{fontSize:'0.8rem',color:'var(--t2)',marginBottom:10,lineHeight:1.5}}>Ingresá el dinero real que tenés en mano. La app te dice si cuadra con lo registrado.</div>
        <label style={S.lbl}>Efectivo real $</label>
        <input style={{...S.inpR,marginBottom:10,fontSize:'1rem'}} type="number" inputMode="numeric" value={efectivoReal} onChange={e=>{setEfectivoReal(e.target.value);setMostrarRes(false);}} placeholder="0"/>
        <button style={S.btnP} onClick={()=>setMostrarRes(true)} disabled={!efectivoReal}>Calcular diferencia</button>
        {mostrarRes&&diferencia!==null&&<div style={{marginTop:12,padding:'14px',borderRadius:12,background:Math.abs(diferencia)<100?'var(--sdim)':diferencia>0?'var(--sdim)':'var(--ddim)',border:`0.5px solid ${Math.abs(diferencia)<100?'var(--sborder)':diferencia>0?'var(--sborder)':'var(--dborder)'}`}}>
          <div style={{fontSize:'0.7rem',fontWeight:700,color:diferencia>=0?'var(--success)':'var(--danger)',textTransform:'uppercase',marginBottom:4}}>
            {Math.abs(diferencia)<100?'✅ Cuadra perfecto':diferencia>0?'⬆️ Tenés de más':'⬇️ Falta dinero'}
          </div>
          <div style={{fontFamily:'var(--fh)',fontSize:'1.5rem',fontWeight:800,color:diferencia>=0?'var(--success)':'var(--danger)'}}>
            {diferencia>=0?'+':''}{fmt(diferencia)}
          </div>
          <div style={{fontSize:'0.75rem',color:'var(--t2)',marginTop:6}}>
            Registrado en app: {fmt(balanceAnio)} · Real: {fmt(Number(efectivoReal))}
          </div>
        </div>}
      </div>
    </div>
  </div>;
}

          {[['light','☀️ Claro'],['dark','🌙 Oscuro']].map(([v,l])=>{
            const activo=(v==='dark')===dark;
            return<button key={v} onClick={()=>setDark(v==='dark')} style={{flex:1,padding:'12px 0',borderRadius:10,fontSize:14,fontWeight:600,cursor:'pointer',border:`1.5px solid ${activo?'var(--primary)':'var(--border)'}`,background:activo?'var(--pdim)':'transparent',color:activo?'var(--primary)':'var(--t2)',transition:'all 0.2s'}}>{l}</button>;
          })}
        </div>
      </div>
      <div style={{...S.card,marginBottom:12}}>
        <div style={{fontSize:11,color:'var(--t2)',marginBottom:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.04em'}}>📂 Datos</div>
        <div style={{fontSize:13,color:'var(--t2)',lineHeight:1.6,marginBottom:12}}>☁️ Tus datos se guardan en Firebase. También podés exportar o importar un archivo de respaldo.</div>
        <button style={{...S.btnP,marginBottom:8}} onClick={onExportar}>📥 Exportar datos</button>
        <button style={{...S.btn,width:'100%',padding:'11px',fontSize:14,textAlign:'center',marginBottom:8}} onClick={onImportar}>📤 Importar datos (JSON)</button>
      </div>
      <div style={{...S.card,marginBottom:12,background:'var(--ddim)',border:'0.5px solid var(--dborder)'}}>
        <div style={{fontSize:11,color:'var(--danger)',marginBottom:6,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.04em'}}>⚠️ Zona peligrosa</div>
        <div style={{fontSize:13,color:'var(--t2)',marginBottom:12,lineHeight:1.5}}>Borra todos los movimientos, tarjetas y pagos. No se puede deshacer.</div>
        <button style={{background:'var(--danger)',color:'#fff',borderRadius:10,padding:'11px',fontSize:14,fontWeight:700,width:'100%',cursor:'pointer',border:'none'}} onClick={onLimpiar}>🗑️ Borrar todos los datos</button>
      </div>
      <div style={{...S.card,textAlign:'center'}}><div style={{fontFamily:'var(--fh)',fontSize:14,fontWeight:700,color:'var(--t2)',marginBottom:2}}>Emma Control v1.1</div><div style={{fontSize:11,color:'var(--t3)'}}>Emma Soluciones Digitales</div></div>
    </div>
  </div>;
}

/* ══ APP PRINCIPAL ══ */
function LockScreen({onOk}){
  const[pin,setPin]=useState('');const[err,setErr]=useState('');const[modo,setModo]=useState('huella');
  const credId=localStorage.getItem('ec_lock_cred');const pinOk=localStorage.getItem('ec_lock_pin');
  useEffect(()=>{if(credId){bioVerificar(credId).then(onOk).catch(()=>{});}},[]);
  const tryBio=async()=>{setErr('');if(!credId){setModo('pin');return;}try{await bioVerificar(credId);onOk();}catch(e){setErr('No se reconoció la huella. Probá de nuevo o usá el PIN.');}};
  const checkPin=()=>{if(pin===pinOk){onOk();}else{setErr('PIN incorrecto');setPin('');}};
  return<div style={{position:'fixed',inset:0,background:'var(--bg)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:18,padding:24,zIndex:9999}}>
    <div style={{fontFamily:'var(--fh)',fontSize:22,fontWeight:800,color:'var(--text)'}}>Emma Control</div>
    <div style={{fontSize:54}}>🔒</div>
    {modo==='huella'?<>
      <button onClick={tryBio} style={{padding:'14px 22px',borderRadius:14,fontSize:16,fontWeight:700,border:'none',background:'var(--primary)',color:'#fff',cursor:'pointer'}}>👆 Desbloquear con huella</button>
      <button onClick={()=>{setErr('');setModo('pin');}} style={{background:'none',border:'none',color:'var(--t2)',fontSize:13,cursor:'pointer',textDecoration:'underline'}}>Usar PIN de respaldo</button>
    </>:<>
      <input type="password" inputMode="numeric" maxLength={4} value={pin} onChange={e=>setPin(e.target.value.replace(/\D/g,''))} placeholder="PIN" style={{width:180,textAlign:'center',fontSize:22,letterSpacing:8,padding:'12px',borderRadius:12,border:'1.5px solid var(--border)',background:'var(--card)',color:'var(--text)'}} autoFocus/>
      <button onClick={checkPin} style={{padding:'12px 22px',borderRadius:12,fontSize:15,fontWeight:700,border:'none',background:'var(--primary)',color:'#fff',cursor:'pointer'}}>Entrar</button>
      {credId&&<button onClick={()=>{setErr('');setModo('huella');}} style={{background:'none',border:'none',color:'var(--t2)',fontSize:13,cursor:'pointer',textDecoration:'underline'}}>Volver a la huella</button>}
    </>}
    {err&&<div style={{color:'#dc2626',fontSize:13,textAlign:'center'}}>{err}</div>}
  </div>;
}
function BloqueoHuella(){
  const[on,setOn]=useState(()=>localStorage.getItem('ec_lock_on')==='1');const[disp,setDisp]=useState(true);
  useEffect(()=>{bioDisponible().then(setDisp);},[]);
  const activar=async()=>{if(!await bioDisponible()){alert('Este dispositivo no tiene lector de huella o Face ID.');return;}const pin=window.prompt('Elegí un PIN de respaldo de 4 dígitos (por si la huella falla):');if(pin===null)return;if(!/^\d{4}$/.test(pin)){alert('El PIN tiene que ser exactamente 4 números.');return;}try{const cred=await bioRegistrar();localStorage.setItem('ec_lock_cred',cred);localStorage.setItem('ec_lock_pin',pin);localStorage.setItem('ec_lock_on','1');setOn(true);alert('✅ Bloqueo activado. La próxima vez que abras la app te va a pedir la huella.');}catch(e){alert('No se pudo registrar la huella. Probá de nuevo.');}};
  const desactivar=()=>{if(!window.confirm('¿Desactivar el bloqueo con huella?'))return;localStorage.removeItem('ec_lock_on');localStorage.removeItem('ec_lock_cred');localStorage.removeItem('ec_lock_pin');setOn(false);};
  return<div style={{...S.card,marginBottom:12}}>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12}}>
      <div><div style={{fontSize:15,fontWeight:600,color:'var(--text)'}}>🔒 Bloqueo con huella</div><div style={{fontSize:12,color:'var(--t2)',marginTop:2}}>{on?'Activado · te pide la huella al abrir':(disp?'Pedí tu huella o Face ID para abrir':'Tu dispositivo no tiene lector')}</div></div>
      <button onClick={on?desactivar:activar} disabled={!disp&&!on} style={{padding:'8px 14px',borderRadius:10,fontSize:13,fontWeight:600,cursor:(disp||on)?'pointer':'not-allowed',border:'none',background:on?'#dc2626':(disp?'var(--primary)':'var(--border)'),color:'#fff',flexShrink:0}}>{on?'Desactivar':'Activar'}</button>
    </div>
  </div>;
}
function App(){
  const[user,setUser]=useState(undefined);
  const[unlocked,setUnlocked]=useState(()=>localStorage.getItem('ec_lock_on')!=='1');
  const[dark,setDark]=useTema();
  const[esc,setEsc]=useEscala();
  const[pant,setPant]=useState('dashboard');
  const[mMov,setMMov]=useState(false);
  const[tipoMov,setTipoMov]=useState(null);
  const[eMovActual,setEMovActual]=useState(null); // movimiento que se está editando
  const[mTarj,setMTarj]=useState(false);const[eTarj,setETarj]=useState(null);
  const[mFijo,setMFijo]=useState(false);const[eFijo,setEFijo]=useState(null);

  useEffect(()=>{const u=auth.onAuthStateChanged(u=>setUser(u||null));return u;},[]);
  const uid=user?.uid;
  const integracion=useIntegracion(uid);
  const[movs,setMovs,rM]=useFirestore(uid,'movimientos',[]);
  const[tarj,setTarj,rT]=useFirestore(uid,'tarjetas',[]);
  const[fijos,setFijos,rF]=useFirestore(uid,'gastosFijos',FDEF);
  const[pagos,setPagos,rP]=useFirestore(uid,'pagosFijos',[]);

  const agrMov=m=>setMovs(p=>[...p,m]);
  // Editar un movimiento existente
  const editMov=useCallback(m=>setMovs(p=>p.map(x=>x.id===m.id?m:x)),[setMovs]);
  const delMov=id=>{if(window.confirm('¿Eliminar este movimiento?'))setMovs(p=>p.filter(m=>m.id!==id));};
  const saveTarj=t=>setTarj(p=>p.find(x=>x.id===t.id)?p.map(x=>x.id===t.id?t:x):[...p,t]);
  const delTarj=id=>{if(!window.confirm('¿Eliminar tarjeta?'))return;const cq=movs.filter(m=>m.tipo==='cuota'&&m.tarjetaId===id&&!m.saldada&&(m.venc||[]).some(v=>dh(v)>=0));if(cq.length>0&&window.confirm('Esta tarjeta tiene '+cq.length+' compra(s) en cuotas pendientes. ¿Borrar también esas cuotas? (Cancelar = dejarlas en "Cuotas sin tarjeta")')){const ids=new Set(cq.map(c=>c.id));setMovs(p=>p.filter(m=>!ids.has(m.id)));}setTarj(p=>p.filter(t=>t.id!==id));};
  const saveFijo=f=>setFijos(p=>p.find(x=>x.id===f.id)?p.map(x=>x.id===f.id?f:x):[...p,f]);
  const delFijo=id=>{if(window.confirm('¿Eliminar gasto fijo?'))setFijos(p=>p.filter(f=>f.id!==id));};
  const cerrarSesion=()=>{if(window.confirm('¿Cerrar sesión?'))auth.signOut();};
  const exportarDatos=()=>{
    const data={movs,tarj,fijos,pagos,exportado:new Date().toISOString()};
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
    a.download=`emma-control-${hoy()}.json`;a.click();
  };
  const importarDatos=()=>{
    const inp=document.createElement('input');inp.type='file';inp.accept='.json';
    inp.onchange=e=>{const f=e.target.files[0];if(!f)return;
      const r=new FileReader();r.onload=async ev=>{
        try{
          const d=JSON.parse(ev.target.result);
          const uid=auth.currentUser?.uid;
          if(!uid){alert('Tenés que estar logueado');return;}
          const base=db.collection('users').doc(uid).collection('datos');
          await Promise.all([
            base.doc('movimientos').set({items:d.movs||[]}),
            base.doc('tarjetas').set({items:d.tarj||[]}),
            base.doc('gastosFijos').set({items:d.fijos||[]}),
            base.doc('pagosFijos').set({items:d.pagos||[]}),
          ]);
          alert('✅ Importados: '+((d.movs||[]).length)+' movimientos, '+((d.fijos||[]).length)+' gastos fijos');
        }catch(err){alert('❌ Error: '+err.message);}
      };r.readAsText(f);};inp.click();
  };
  const limpiarDatos=async()=>{
    if(!window.confirm('¿Borrar TODOS los datos? Esto no se puede deshacer.'))return;
    if(!window.confirm('¿Estás seguro? Se van a perder todos los movimientos, tarjetas y pagos.'))return;
    const uid=auth.currentUser?.uid;
    if(uid){
      const base=db.collection('users').doc(uid).collection('datos');
      await Promise.all([
        base.doc('movimientos').set({items:[]}),
        base.doc('tarjetas').set({items:[]}),
        base.doc('gastosFijos').set({items:FDEF}),
        base.doc('pagosFijos').set({items:[]}),
      ]);
    }
    setMovs([]);setTarj([]);setFijos(FDEF);setPagos([]);
    alert('✅ Datos borrados correctamente');
  };

  // Abrir modal para NUEVO movimiento
  const abrirMov=useCallback((tipo=null)=>{
    setTipoMov(tipo);setEMovActual(null);setMMov(true);
  },[]);

  // Abrir modal para EDITAR un movimiento existente
  const abrirEditMov=useCallback(m=>{
    setTipoMov(null);setEMovActual(m);setMMov(true);
  },[]);

  /* ── SWIPE NAVIGATION ── */
  const navPant=['dashboard','movimientos','tarjetas','fijos','config'];
  const detallePant=['ingresos','egresos','arqueo'];

  const swipeLeft=useCallback(()=>{
    // Si hay algún modal abierto, no navegar
    if(mMov||mTarj||mFijo)return;
    if(navPant.includes(pant)){
      const i=navPant.indexOf(pant);
      if(i<navPant.length-1)setPant(navPant[i+1]);
    }
  },[pant,mMov,mTarj,mFijo]);

  const swipeRight=useCallback(()=>{
    if(mMov||mTarj||mFijo)return;
    if(navPant.includes(pant)){
      const i=navPant.indexOf(pant);
      if(i>0)setPant(navPant[i-1]);
    }else if(detallePant.includes(pant)){
      // En pantallas de detalle, swipe derecha = volver al dashboard
      setPant('dashboard');
    }
  },[pant,mMov,mTarj,mFijo]);

  const{onTouchStart,onTouchEnd}=useSwipe(swipeLeft,swipeRight);

  // ── Atrás del teléfono (gesto lateral / botón): volver a Inicio o cerrar el modal abierto, en vez de salir de la app ──
  const navRef=useRef({});
  useEffect(()=>{navRef.current={pant,modal:mMov||mTarj||mFijo};});
  useEffect(()=>{
    window.history.pushState(null,'');
    const onPop=()=>{
      const st=navRef.current;
      if(st.modal){setMMov(false);setMTarj(false);setMFijo(false);window.history.pushState(null,'');return;}
      if(st.pant!=='dashboard'){setPant('dashboard');window.history.pushState(null,'');}
    };
    window.addEventListener('popstate',onPop);
    return()=>window.removeEventListener('popstate',onPop);
  },[]);

  if(user===undefined)return<div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16,background:'var(--bg)'}}>
    <div className="spin" style={{fontSize:32}}>⏳</div>
    <div style={{fontFamily:'var(--fh)',fontSize:16,color:'var(--t2)'}}>Cargando...</div>
  </div>;
  if(!user)return<AuthScreen/>;
  if(!unlocked)return<LockScreen onOk={()=>setUnlocked(true)}/>;
  if(!(rM&&rT&&rF&&rP))return<div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16,background:'var(--bg)'}}>
    <div className="spin" style={{fontSize:32}}>☁️</div>
    <div style={{fontFamily:'var(--fh)',fontSize:16,color:'var(--t2)'}}>Sincronizando datos...</div>
  </div>;

  const render=()=>{switch(pant){
    case'dashboard':return<Dashboard movs={movs} fijos={fijos} pagos={pagos} tarjetas={tarj} onNuevo={()=>abrirMov()} onVerIngresos={()=>setPant('ingresos')} onVerEgresos={()=>setPant('egresos')} onVerArqueo={()=>setPant('arqueo')}/>;
    case'ingresos':return<DetalleIngresos movs={movs} onNuevo={t=>abrirMov(t)} onEditar={abrirEditMov} onEliminar={delMov} onVolver={()=>setPant('dashboard')}/>;
    case'egresos':return<DetalleEgresos movs={movs} tarjetas={tarj} onNuevo={t=>abrirMov(t)} onEditar={abrirEditMov} onEliminar={delMov} onVolver={()=>setPant('dashboard')}/>;
    case'movimientos':return<Movimientos movs={movs} onNuevo={()=>abrirMov()} onEliminar={delMov} onEditar={abrirEditMov}/>;
    case'tarjetas':return<Tarjetas tarjetas={tarj} movs={movs} onAgregar={()=>{setETarj(null);setMTarj(true);}} onEditar={t=>{setETarj(t);setMTarj(true);}} onEliminar={delTarj} onSaldarCuota={id=>{if(window.confirm('¿Marcar esta cuota como saldada? Va a desaparecer de la deuda.'))setMovs(p=>p.map(m=>m.id===id?{...m,saldada:true}:m));}} onPagarCuota={c=>{if(!window.confirm('¿Confirmás el pago de una cuota de "'+(c.desc||'Cuota')+'" ('+fmt(c.montoCuota)+')? Se registra como gasto.'))return;setMovs(p=>[...p,{id:uid2(),tipo:'gasto',desc:(c.desc||'Cuota')+' (cuota)',monto:c.montoCuota,fecha:hoy(),cat:'Tarjeta',ent:c.ent||'personal',cuotaId:c.id}]);}} onEliminarCuota={delMov}/>;
    case'fijos':return<GastosFijos fijos={fijos} movs={movs} setMovs={setMovs} onAgregar={()=>{setEFijo(null);setMFijo(true);}} onEditar={f=>{setEFijo(f);setMFijo(true);}} onEliminar={delFijo}/>;
    case'arqueo':return<Arqueo movs={movs} pagos={pagos} onVolver={()=>setPant('dashboard')}/>;
    case'config':return<Config user={user} onCerrarSesion={cerrarSesion} dark={dark} setDark={setDark} integracion={integracion} onSyncLC={()=>integracion.importarDesdeLC(setMovs)} onExportar={exportarDatos} onImportar={importarDatos} onLimpiar={limpiarDatos}/>;
  }};

  return(
    <div
      style={{display:'flex',flexDirection:'column',height:'100%',position:'relative',overflow:'hidden',touchAction:'pan-y',overscrollBehavior:'none'}}
      onTouchStart={onTouchStart}
      onTouchEnd={onTouchEnd}
    >
      {render()}
      {navPant.includes(pant)&&<Nav act={pant} go={setPant}/>}
      {navPant.includes(pant)&&<BtnEscala esc={esc} setEsc={setEsc}/>}
      {mMov&&<ModalMov
        tarjetas={tarj}
        onGuardar={agrMov}
        onEditar={editMov}
        tipoInicial={tipoMov}
        movimiento={eMovActual}
        onClose={()=>{setMMov(false);setTipoMov(null);setEMovActual(null);}}
      />}
      {mTarj&&<ModalTarj tarjeta={eTarj} onGuardar={saveTarj} onClose={()=>{setMTarj(false);setETarj(null);}}/>}
      {mFijo&&<ModalFijo fijo={eFijo} onGuardar={saveFijo} onClose={()=>{setMFijo(false);setEFijo(null);}}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
